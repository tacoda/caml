test:
  desc: Run the test suite
  aliases:
    - t
  execute: bundle exec rspec

lint:
  desc: Check code style
  opts:
    fix:
      type: boolean
      aliases:
        - a
      desc: Auto-correct correctable offenses
      execute: bundle exec rubocop -A
  execute: bundle exec rubocop

build:
  desc: Build the gem
  execute: gem build caml.gemspec

ci:
  desc: Run lint and tests
  needs:
    - lint
    - test
